name: Auto Git Mirror Sync

on:
  pull_request:
    branches:
      - dev
      - main
    types: [closed]

jobs:
  mirror_sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Connect To Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          
      - name: SSH Update and zip in merge
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 設定變數
            BACKUP_DIR="/home/${{ secrets.SERVER_USER }}/backups"
            REPO_PATH="${BACKUP_DIR}/Luiu.git"
            ZIP_DIR="${BACKUP_DIR}/zip_merge"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BRANCH_NAME="${{ github.base_ref }}"
            ZIP_NAME="Luiu_${BRANCH_NAME}_${TIMESTAMP}.zip"

            # 進入資料夾
            cd $REPO_PATH
            # 更新
            git remote update

            # 4. 壓縮整個 Git 庫並存放到指定目錄
            # 使用 -r 遞迴壓縮，-j 不儲存多餘路徑
            mkdir -p $ZIP_DIR
            zip -r "${ZIP_DIR}/${ZIP_NAME}" .

            # 紀錄更新時間
            echo "[$(date)] Merged ${{ github.event.pull_request.head.ref }} into ${{ github.base_ref }}. Mirror updated." >> /home/${{ secrets.SERVER_USER }}/backups/merge_mirror.log

            cd $ZIP_DIR && ls -t *.zip | tail -n +101 | xargs -r rm
